name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: sap-integration-service
  REPO_NAME: sap-b1-adapter                  # השם של המאגר שיצרת ב-Artifact Registry

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # הגדרת Docker לעבודה מול השרת החדש (Artifact Registry) באזור אירופה
    - name: Configure Docker for GCP
      run: |
        gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

    # בנייה ודחיפה לכתובת החדשה של ה-Artifact Registry
    - name: Build and Push Docker Image
      run: |
        docker build -t europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.REPO_NAME }}:${{ github.sha }} .
        docker push europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.REPO_NAME }}:${{ github.sha }}

    # פריסה ל-Cloud Run מהמיקום החדש
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.REPO_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --port 3000 \
          --allow-unauthenticated