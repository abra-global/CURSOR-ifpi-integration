name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main  # מפעיל את התהליך בכל פעם שיש push ל-main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # מזהה הפרויקט שלך בגוגל (יוגדר ב-GitHub Secrets)
  REGION: europe-west1                      # האזור שבחרת בגוגל קלאוד
  SERVICE_NAME: sap-integration-service     # השם שיינתן לשירות ב-Cloud Run
  IMAGE_NAME: sap-b1-adapter                # שם האימג' שייבנה

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. משיכת הקוד מה-Repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. התחברות לגוגל קלאוד באמצעות מפתח אבטחה
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }} # מפתח האבטחה (יוגדר ב-GitHub Secrets)

    # 3. הגדרת ה-Cloud SDK במכונה של GitHub
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 4. הגדרת Docker לעבודה מול גוגל קלאוד
    - name: Configure Docker for GCP
      run: |
        gcloud auth configure-docker --quiet

    # 5. בניית ה-Docker Image ודחיפתו ל-Google Container Registry
    - name: Build and Push Docker Image
      run: |
        docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 6. פריסה ל-Cloud Run וחשיפת פורט 3000
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --port 3000 \
          --allow-unauthenticated